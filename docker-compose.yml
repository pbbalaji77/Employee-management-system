version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ems_postgres_db
    environment:
      POSTGRES_USER: ems_user
      POSTGRES_PASSWORD: ems_pass
      POSTGRES_DB: ems_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  web:
    build: .
    container_name: ems_web_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://ems_user:ems_pass@db:5432/ems_db
      - SECRET_KEY=prod_secret_key_ems_system_998877
      - JWT_SECRET_KEY=prod_jwt_secret_key_ems_system_112233
      - MAX_CONTENT_LENGTH=16777216
    depends_on:
      - db
    volumes:
      - .:/app
      - uploads_volume:/app/static/uploads

  nginx:
    image: nginx:alpine
    container_name: ems_nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/app:ro
    depends_on:
      - web

volumes:
  pgdata:
  uploads_volume:
