<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Signup - Enterprise EMS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem 1.5rem;
        }
        .signup-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.125);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            color: #f8fafc;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 12px;
            padding: 0.65rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        option {
            background: #1e293b;
            color: #fff;
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <div class="text-center mb-4">
            <h3 class="font-weight-bold mb-1">Employee Registration</h3>
            <p class="text-muted small">Create your profile portal account</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show border-0 bg-opacity-10 bg-danger text-danger mb-4" role="alert" style="border-radius: 12px; font-size: 0.85rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.signup_view') }}" method="POST">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small font-weight-bold">First Name</label>
                    <input type="text" class="form-control" name="first_name" required>
                </div>
                <div class="col-6">
                    <label class="form-label small font-weight-bold">Last Name</label>
                    <input type="text" class="form-control" name="last_name" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small font-weight-bold">Email Address</label>
                <input type="email" class="form-control" name="email" placeholder="name@company.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label small font-weight-bold">Password</label>
                <input type="password" class="form-control" name="password" placeholder="Min. 8 characters" required>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label small font-weight-bold">Gender</label>
                    <select class="form-select" name="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label small font-weight-bold">Mobile Number</label>
                    <input type="text" class="form-control" name="mobile_number" placeholder="10-digit number">
                </div>
            </div>

            <div class="row g-2 mb-4">
                <div class="col-6">
                    <label class="form-label small font-weight-bold">Department</label>
                    <select class="form-select" name="department_id" required>
                        {% for d in departments %}
                        <option value="{{ d.id }}">{{ d.department_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label small font-weight-bold">Designation</label>
                    <input type="text" class="form-control" name="designation" value="Associate" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Register Profile</button>

            <div class="text-center">
                <a href="{{ url_for('auth.login_view') }}" class="text-info small text-decoration-none">Already registered? Sign In</a>
            </div>
        </form>
    </div>

</body>
</html>
