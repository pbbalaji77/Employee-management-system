{% extends "base.html" %}

{% block title %}Departments - Enterprise EMS{% endblock %}
{% block header_title %}Department Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="text-muted mb-0">Divisional Overview</h5>
    <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#createDeptModal">
        <i class="bi bi-plus-circle-fill me-1"></i> Add Department
    </button>
</div>

<!-- Department Cards Grid -->
<div class="row g-4 mb-4" id="departmentsContainer">
    <!-- Dynamic Cards Rendered by JS -->
    <div class="col-12 text-center py-5">Loading departments list...</div>
</div>

<!-- Add Department Modal -->
<div class="modal fade" id="createDeptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card p-0" style="border-radius: 16px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title font-weight-bold">Create Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="createDeptForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Department Name</label>
                        <input type="text" class="form-control" name="department_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Department Head (Manager)</label>
                        <select class="form-select" name="department_head_id">
                            <option value="">Select Head...</option>
                            {% for e in employees %}
                            <option value="{{ e.id }}">{{ e.full_name }} ({{ e.designation }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Annual Budget Allocation (INR)</label>
                        <input type="number" step="0.01" class="form-control" name="budget" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Create Division</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Department Modal -->
<div class="modal fade" id="editDeptModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card p-0" style="border-radius: 16px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title font-weight-bold" id="editDeptTitle">Edit Department</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editDeptForm">
                <input type="hidden" name="dept_id" id="editDeptId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Department Name</label>
                        <input type="text" class="form-control" name="department_name" id="editDeptName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Department Head (Manager)</label>
                        <select class="form-select" name="department_head_id" id="editDeptHeadId">
                            <option value="">Select Head...</option>
                            {% for e in employees %}
                            <option value="{{ e.id }}">{{ e.full_name }} ({{ e.designation }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Annual Budget Allocation (INR)</label>
                        <input type="number" step="0.01" class="form-control" name="budget" id="editDeptBudget" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Description</label>
                        <textarea class="form-control" name="description" id="editDeptDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener("DOMContentLoaded", () => {
        loadDepartments();

        // Create department handler
        const createForm = document.getElementById("createDeptForm");
        if (createForm) {
            createForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const payload = {
                    department_name: createForm.department_name.value,
                    department_head_id: createForm.department_head_id.value ? parseInt(createForm.department_head_id.value) : null,
                    budget: parseFloat(createForm.budget.value),
                    description: createForm.description.value
                };
                
                try {
                    const res = await apiRequest("/api/departments", {
                        method: "POST",
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`Department ${data.department_name} created successfully!`, "success");
                        bootstrap.Modal.getInstance(document.getElementById("createDeptModal")).hide();
                        createForm.reset();
                        loadDepartments();
                    } else {
                        showToast(data.message || "Failed to create department.", "danger");
                    }
                } catch (e) {
                    showToast("Error processing request.", "danger");
                }
            });
        }

        // Edit department handler
        const editForm = document.getElementById("editDeptForm");
        if (editForm) {
            editForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const id = document.getElementById("editDeptId").value;
                const payload = {
                    department_name: editForm.department_name.value,
                    department_head_id: editForm.department_head_id.value ? parseInt(editForm.department_head_id.value) : null,
                    budget: parseFloat(editForm.budget.value),
                    description: editForm.description.value
                };

                try {
                    const res = await apiRequest(`/api/departments/${id}`, {
                        method: "PUT",
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showToast(`Department updated successfully!`, "success");
                        bootstrap.Modal.getInstance(document.getElementById("editDeptModal")).hide();
                        loadDepartments();
                    } else {
                        showToast(data.message || "Update failed.", "danger");
                    }
                } catch (e) {
                    showToast("Error updating department.", "danger");
                }
            });
        }
    });

    async function loadDepartments() {
        try {
            const res = await apiRequest("/api/departments");
            if (!res.ok) return;
            const departments = await res.json();
            
            renderCards(departments);
        } catch (e) {
            console.error(e);
        }
    }

    function renderCards(departments) {
        const container = document.getElementById("departmentsContainer");
        if (!container) return;

        if (departments.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5 text-muted">No departments registered.</div>';
            return;
        }

        let html = "";
        departments.forEach(d => {
            html += `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="glass-card h-100 d-flex flex-column justify-content-between">
                        <div>
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="font-weight-bold mb-0 text-primary">${d.department_name}</h5>
                                <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3">${d.employee_count} Employees</span>
                            </div>
                            <p class="text-muted small mb-3">${d.description || 'No description provided.'}</p>
                            
                            <div class="text-start mb-4">
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="text-muted small">Head of Dept:</span>
                                    <span class="font-weight-bold small text-dark">${d.department_head_name}</span>
                                </div>
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="text-muted small">Annual Budget:</span>
                                    <span class="font-weight-bold small text-dark">INR ${d.budget.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-secondary rounded-pill w-100" onclick="openEditModal(${d.id})">
                                <i class="bi bi-pencil-square me-1"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="deleteDept(${d.id}, '${d.department_name}')" style="width: 32px; height: 32px; padding: 0;">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    async function openEditModal(id) {
        try {
            const res = await apiRequest(`/api/departments/${id}`);
            if (!res.ok) return;
            const d = await res.json();
            
            document.getElementById("editDeptId").value = d.id;
            document.getElementById("editDeptName").value = d.department_name;
            document.getElementById("editDeptHeadId").value = d.department_head_id || "";
            document.getElementById("editDeptBudget").value = d.budget;
            document.getElementById("editDeptDescription").value = d.description || "";
            
            // Show modal
            const modal = new bootstrap.Modal(document.getElementById("editDeptModal"));
            modal.show();
        } catch (e) {
            console.error(e);
        }
    }

    async function deleteDept(id, name) {
        if (!confirm(`Are you sure you want to delete the Department '${name}'?`)) return;
        try {
            const res = await apiRequest(`/api/departments/${id}`, { method: "DELETE" });
            const data = await res.json();
            if (res.ok) {
                showToast("Department deleted successfully.", "success");
                loadDepartments();
            } else {
                showToast(data.message || "Failed to delete division.", "danger");
            }
        } catch (e) {
            showToast("Server communication error.", "danger");
        }
    }
</script>
{% endblock %}
