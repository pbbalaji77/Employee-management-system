<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Company - Enterprise EMS</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1.5rem;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.125);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            color: #f8fafc;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <div class="mb-3 d-inline-block p-3 rounded-circle" style="background: rgba(59, 130, 246, 0.2);">
                <i class="bi bi-building text-info" style="font-size: 2.5rem;"></i>
            </div>
            <h3 class="font-weight-bold mb-1">Register Company</h3>
            <p class="text-muted small">Create an organization account to get started</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show border-0 bg-opacity-10 bg-danger text-danger mb-4" role="alert" style="border-radius: 12px; font-size: 0.85rem;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register_view') }}" method="POST">
            <div class="mb-3">
                <label class="form-label small font-weight-bold">Company / Organization Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted"><i class="bi bi-building-fill"></i></span>
                    <input type="text" class="form-control border-start-0" name="company_name" placeholder="e.g. Acme Corporation" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small font-weight-bold">HR Admin Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted"><i class="bi bi-person-fill"></i></span>
                    <input type="text" class="form-control border-start-0" name="username" placeholder="e.g. admin_acme" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small font-weight-bold">Admin Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control border-start-0" name="email" placeholder="hr@company.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label small font-weight-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-white border-opacity-15 text-muted"><i class="bi bi-shield-lock"></i></span>
                    <input type="password" class="form-control border-start-0" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Register Company</button>
            <div class="text-center">
                <span class="small text-muted">Already have a company profile? </span>
                <a href="{{ url_for('auth.login_view') }}" class="text-info small text-decoration-none font-weight-bold">Sign In</a>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
